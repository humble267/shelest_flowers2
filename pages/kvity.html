<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Класичні композиції | SHELYST FLOWERS</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="content-page">
    <main class="content-page__section">
      <div class="container">
        <article
          class="content-page__card catalog-page__card"
          data-catalog-page
          data-category-id="classic"
        >
          <p class="content-page__eyebrow" data-catalog-eyebrow>Каталог</p>
          <h1 data-catalog-title>Класичні композиції</h1>
          <p class="content-page__lead catalog-page__lead" data-catalog-lead>
            Тут будуть представлені класичні композиції у стриманому та
            елегантному стилі.
          </p>
          <div class="catalog-page__content" data-catalog-content></div>
        </article>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
