<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пошук | (назва вашого магазину)</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="content-page">
    <main class="content-page__section" data-search-page>
      <div class="container">
        <article class="content-page__card">
          <p class="content-page__eyebrow">(назва вашого магазину)</p>
          <h1>Пошук</h1>
          <p class="content-page__lead">
            Знайдіть потрібний розділ каталогу, сторінку з інформацією або
            контакти магазину.
          </p>

          <div class="search-page">
            <label class="search-page__form" for="catalog-search">
              <span class="search-page__icon" aria-hidden="true"></span>
              <input
                class="search-page__input"
                id="catalog-search"
                type="search"
                placeholder="Пошук по сайту"
                data-search-input
              />
            </label>

            <div class="search-page__results" data-search-results></div>
          </div>
        </article>
      </div>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
