<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Особистий кабінет | SHELYST FLOWERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main>
      <div class="cabinet-page">
        <div class="cabinet-loading" id="cabinet-loading">
          <p>Завантаження...</p>
        </div>

        <div class="cabinet-layout" id="cabinet-layout" hidden>
          <aside class="cabinet-sidebar">
            <div class="cabinet-user-card">
              <div class="cabinet-avatar" id="cabinet-avatar">?</div>
              <div>
                <p class="cabinet-user-name" id="cabinet-user-name"></p>
                <p class="cabinet-user-email" id="cabinet-user-email"></p>
              </div>
            </div>

            <nav class="cabinet-nav" aria-label="Розділи кабінету">
              <button class="cabinet-nav__btn is-active" data-section="profile" type="button">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Профіль
              </button>
              <button class="cabinet-nav__btn" data-section="orders" type="button">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="3" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7h6M6 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Замовлення
              </button>
              <button class="cabinet-nav__btn" data-section="favorites" type="button">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 14S3 10.5 3 6.5A3.5 3.5 0 0 1 9 4a3.5 3.5 0 0 1 6 2.5C15 10.5 9 14 9 14z" stroke="currentColor" stroke-width="1.5"/></svg>
                Обране
              </button>
            </nav>

            <button class="cabinet-logout" id="cabinet-logout" type="button">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M7 9h8M12 6l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 4H5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Вийти
            </button>
          </aside>

          <div class="cabinet-content">
            <section class="cabinet-section is-active" id="section-profile">
              <h2 class="cabinet-section__title">Профіль</h2>
              <div id="profile-success" class="cabinet-success" hidden>Дані збережено</div>
              <form class="cabinet-form" id="profile-form" novalidate>
                <div class="cabinet-form__field">
                  <label for="profile-name">Ім'я та прізвище</label>
                  <input type="text" id="profile-name" required />
                </div>
                <div class="cabinet-form__field">
                  <label for="profile-phone">Телефон</label>
                  <input type="tel" id="profile-phone" />
                </div>
                <div class="cabinet-form__field">
                  <label for="profile-address">Адреса доставки</label>
                  <input type="text" id="profile-address" placeholder="м. Київ, вул. Хрещатик, 1" />
                </div>
                <div class="cabinet-form__field">
                  <label for="profile-email">Email</label>
                  <input type="email" id="profile-email" disabled />
                </div>
                <button class="cabinet-form__submit" type="submit">Зберегти зміни</button>
              </form>
            </section>

            <section class="cabinet-section" id="section-orders" hidden>
              <h2 class="cabinet-section__title">Замовлення</h2>
              <p class="cabinet-section__hint">Тут відображаються товари, які ви переглянули у Telegram для замовлення.</p>
              <div class="cabinet-orders" id="orders-list">
                <p class="cabinet-empty">Завантаження...</p>
              </div>
            </section>

            <section class="cabinet-section" id="section-favorites" hidden>
              <h2 class="cabinet-section__title">Обране</h2>
              <div id="favorites-list">
                <p class="cabinet-empty">Завантаження...</p>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="../script.js"></script>
    <script>
      function formatPrice(price) {
        return new Intl.NumberFormat("uk-UA", { maximumFractionDigits: 0 }).format(price) + " грн";
      }

      function formatDate(ts) {
        if (!ts?.toDate) return "—";
        return ts.toDate().toLocaleDateString("uk-UA", { day: "numeric", month: "long", year: "numeric" });
      }

      function buildOrderCard(order) {
        const STATUS_LABEL = { pending: "Очікується", confirmed: "Підтверджено", delivered: "Доставлено" };
        const STATUS_CLASS = { pending: "is-pending", confirmed: "is-confirmed", delivered: "is-delivered" };
        const imgMarkup = order.productImage
          ? `<img src="${order.productImage}" alt="${order.productName}" />`
          : `<div class="cabinet-order__img-empty"></div>`;
        return `
          <div class="cabinet-order">
            <div class="cabinet-order__media">${imgMarkup}</div>
            <div class="cabinet-order__body">
              <p class="cabinet-order__name">${order.productName}</p>
              <p class="cabinet-order__price">${order.price ? formatPrice(order.price) : "—"}</p>
              <p class="cabinet-order__date">${formatDate(order.createdAt)}</p>
            </div>
            <span class="cabinet-order__status ${STATUS_CLASS[order.status] || ""}">
              ${STATUS_LABEL[order.status] || order.status}
            </span>
          </div>`;
      }

      function buildFavCard(fav) {
        const imgMarkup = fav.productImage
          ? `<img src="${fav.productImage}" alt="${fav.productName}" />`
          : "";
        return `
          <div class="cabinet-fav-card">
            <div class="cabinet-fav-card__media">${imgMarkup}</div>
            <div class="cabinet-fav-card__body">
              <p class="cabinet-fav-card__name">${fav.productName}</p>
              <p class="cabinet-fav-card__price">${fav.price ? formatPrice(fav.price) : "—"}</p>
            </div>
            <button class="cabinet-fav-card__remove" data-remove-fav="${fav.productId}" type="button" aria-label="Видалити з обраного">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1 1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>`;
      }

      async function loadOrders(uid) {
        const listEl = document.getElementById("orders-list");
        try {
          const orders = await window.FB.getOrders(uid);
          if (!orders.length) {
            listEl.innerHTML = '<p class="cabinet-empty">Замовлень поки немає.<br>Натисніть «Купити» на будь-якому товарі — запит з\'явиться тут.</p>';
            return;
          }
          listEl.innerHTML = orders.map(buildOrderCard).join("");
        } catch {
          listEl.innerHTML = '<p class="cabinet-empty">Не вдалося завантажити замовлення.</p>';
        }
      }

      async function loadFavorites(uid) {
        const listEl = document.getElementById("favorites-list");
        try {
          const favs = await window.FB.getFavorites(uid);
          if (!favs.length) {
            listEl.innerHTML = '<p class="cabinet-empty">Обраних товарів немає.<br>Натисніть ♡ на картці товару щоб зберегти.</p>';
            return;
          }
          listEl.innerHTML = '<div class="cabinet-fav-grid">' + favs.map(buildFavCard).join("") + "</div>";
          listEl.querySelectorAll("[data-remove-fav]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const productId = btn.dataset.removeFav;
              btn.disabled = true;
              await window.FB.removeFromFavorites(uid, productId);
              btn.closest(".cabinet-fav-card").remove();
              if (!listEl.querySelector(".cabinet-fav-card")) {
                listEl.innerHTML = '<p class="cabinet-empty">Обраних товарів немає.</p>';
              }
            });
          });
        } catch {
          listEl.innerHTML = '<p class="cabinet-empty">Не вдалося завантажити обране.</p>';
        }
      }

      function initCabinet() {
        window.FB.auth.onAuthStateChanged(async (user) => {
          if (!user) { window.location.replace("login.html"); return; }

          const profile = await window.FB.getUserProfile(user.uid).catch(() => null);

          document.getElementById("cabinet-user-name").textContent = profile?.name || user.displayName || "Користувач";
          document.getElementById("cabinet-user-email").textContent = user.email;
          document.getElementById("cabinet-avatar").textContent = (profile?.name || user.displayName || "?").charAt(0).toUpperCase();
          document.getElementById("profile-name").value = profile?.name || "";
          document.getElementById("profile-phone").value = profile?.phone || "";
          document.getElementById("profile-address").value = profile?.address || "";
          document.getElementById("profile-email").value = user.email;

          document.getElementById("cabinet-loading").hidden = true;
          document.getElementById("cabinet-layout").hidden = false;

          loadOrders(user.uid);
          loadFavorites(user.uid);
        });

        // Nav tabs
        document.querySelectorAll(".cabinet-nav__btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".cabinet-nav__btn").forEach((b) => b.classList.remove("is-active"));
            btn.classList.add("is-active");
            document.querySelectorAll(".cabinet-section").forEach((s) => { s.classList.remove("is-active"); s.hidden = true; });
            const section = document.getElementById(`section-${btn.dataset.section}`);
            section.hidden = false;
            section.classList.add("is-active");
          });
        });

        // Profile save
        document.getElementById("profile-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const user = window.FB.currentUser;
          if (!user) return;
          const btn = e.target.querySelector("button[type=submit]");
          btn.disabled = true;
          try {
            await window.FB.updateUserProfile(user.uid, {
              name: document.getElementById("profile-name").value.trim(),
              phone: document.getElementById("profile-phone").value.trim(),
              address: document.getElementById("profile-address").value.trim(),
            });
            document.getElementById("cabinet-user-name").textContent =
              document.getElementById("profile-name").value.trim().split(" ")[0];
            document.getElementById("cabinet-avatar").textContent =
              document.getElementById("profile-name").value.trim().charAt(0).toUpperCase();
            const successEl = document.getElementById("profile-success");
            successEl.hidden = false;
            setTimeout(() => { successEl.hidden = true; }, 3000);
          } catch (err) { console.error(err); }
          finally { btn.disabled = false; }
        });

        // Logout
        document.getElementById("cabinet-logout").addEventListener("click", async () => {
          await window.FB.signOut();
          window.location.replace("login.html");
        });
      }

      if (window.FB) {
        initCabinet();
      } else {
        window.addEventListener("fb:ready", initCabinet);
      }
    </script>
  </body>
</html>
