<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кошик | (назва вашого магазину)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main>
      <div class="cart-page">
        <div class="container">
          <h1 class="cart-page__title">Кошик</h1>
          <div id="cart-root"></div>
        </div>
      </div>
    </main>

    <div class="checkout-modal" id="checkout-modal" hidden>
      <div class="checkout-modal__backdrop" data-checkout-close></div>
      <div class="checkout-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="checkout-modal-title">
        <button class="checkout-modal__close" type="button" data-checkout-close aria-label="Закрити">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2 2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <p class="checkout-modal__eyebrow">Оформлення замовлення</p>
        <h2 class="checkout-modal__title" id="checkout-modal-title">Дані для доставки</h2>

        <form class="checkout-form" id="checkout-form" novalidate>
          <label class="checkout-field">
            <span>Імʼя та прізвище <i>*</i></span>
            <input type="text" name="cname" autocomplete="name" required placeholder="Олена Коваленко" />
          </label>
          <label class="checkout-field">
            <span>Телефон <i>*</i></span>
            <input type="tel" name="cphone" autocomplete="tel" required placeholder="+380 67 000 00 00" />
          </label>
          <label class="checkout-toggle">
            <span class="checkout-toggle__text">Самовивіз з магазину</span>
            <span class="checkout-toggle__switch">
              <input type="checkbox" name="cpickup" />
              <span class="checkout-toggle__track" aria-hidden="true"></span>
            </span>
          </label>
          <label class="checkout-field" data-address-field>
            <span>Адреса доставки <i>*</i></span>
            <input type="text" name="caddress" autocomplete="street-address" required placeholder="м. Київ, вул. Прикладна, 1, кв. 5" />
          </label>
          <label class="checkout-field">
            <span>Бажана дата і час доставки</span>
            <input type="text" name="cdate" placeholder="Напр.: 14 червня, до 12:00" />
          </label>
          <label class="checkout-field">
            <span>Коментар до замовлення</span>
            <textarea name="ccomment" rows="2" placeholder="Текст листівки, побажання..."></textarea>
          </label>

          <div class="checkout-form__summary">
            <span>До сплати:</span>
            <strong id="checkout-form-total">0 грн</strong>
          </div>

          <button class="checkout-form__submit" type="submit">Перейти до оплати</button>
          <p class="checkout-form__secure">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 1l4 1.7v3c0 2.6-1.7 4.5-4 5.3-2.3-.8-4-2.7-4-5.3v-3L6.5 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            Безпечна оплата карткою через Portmone
          </p>
        </form>
      </div>
    </div>

    <script src="../script.js"></script>
    <script>
      function renderCart() {
        const root = document.getElementById("cart-root");
        const items = window.CART.getItems();

        if (!items.length) {
          root.innerHTML = `
            <div class="cart-empty">
              <svg class="cart-empty__icon" width="72" height="72" viewBox="0 0 72 72" fill="none" aria-hidden="true">
                <path d="M9 9h6.75L24 39.6a4.5 4.5 0 0 0 4.35 3.15h27a4.5 4.5 0 0 0 4.35-3.15L65.25 22.5H22.5" stroke="#c98698" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="31.5" cy="58.5" r="3.375" stroke="#c98698" stroke-width="2.5"/>
                <circle cx="56.25" cy="58.5" r="3.375" stroke="#c98698" stroke-width="2.5"/>
              </svg>
              <p class="cart-empty__title">Кошик порожній</p>
              <p class="cart-empty__hint">Додайте товари з каталогу</p>
              <a class="cart-empty__btn" href="../index.html">До каталогу</a>
            </div>
          `;
          return;
        }

        const total = window.CART.getTotal();
        const count = window.CART.getCount();
        const telegramUrl = CONTACT_TELEGRAM_URL + "?text=" + encodeURIComponent(window.CART.toTelegramMessage());

        const itemsHTML = items.map((item) => {
          const lineTotal = item.price * (item.qty || 1);
          const imgMarkup = item.image
            ? `<img src="${item.image}" alt="${item.name}" />`
            : `<div class="cart-item__img-placeholder"></div>`;
          return `
            <div class="cart-item" data-cart-item="${item.id}">
              <div class="cart-item__media">${imgMarkup}</div>
              <div class="cart-item__body">
                <p class="cart-item__name">${item.name}</p>
                <p class="cart-item__unit-price">${formatPrice(item.price)} / шт</p>
              </div>
              <div class="cart-item__qty">
                <button class="cart-qty__btn" type="button" data-qty-dec="${item.id}" aria-label="Зменшити кількість">−</button>
                <span class="cart-qty__val">${item.qty || 1}</span>
                <button class="cart-qty__btn" type="button" data-qty-inc="${item.id}" aria-label="Збільшити кількість">+</button>
              </div>
              <div class="cart-item__total">${formatPrice(lineTotal)}</div>
              <button class="cart-item__remove" type="button" data-cart-remove="${item.id}" aria-label="Видалити товар">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1 1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>
            </div>
          `;
        }).join("");

        root.innerHTML = `
          <div class="cart-layout">
            <div class="cart-items">
              ${itemsHTML}
            </div>
            <div class="cart-summary">
              <div class="cart-summary__row">
                <span>Товарів у кошику:</span>
                <span>${count} шт</span>
              </div>
              <div class="cart-summary__row cart-summary__total-row">
                <span>Разом:</span>
                <strong>${formatPrice(total)}</strong>
              </div>
              <button class="cart-summary__pay" type="button" data-checkout-online>
                Купити
              </button>
              <a class="cart-summary__checkout cart-summary__checkout--tg" href="${telegramUrl}" target="_blank" rel="noreferrer">
                Купити через Telegram
              </a>
              <p class="cart-summary__note">
                «Купити» — онлайн-оплата карткою. «Telegram» — оформлення через менеджера.
              </p>
            </div>
          </div>
        `;
      }

      // Event delegation for cart interactions
      document.addEventListener("click", (e) => {
        const decBtn = e.target.closest("[data-qty-dec]");
        if (decBtn) {
          const id = decBtn.dataset.qtyDec;
          const item = window.CART.getItems().find((i) => i.id === id);
          if (item) window.CART.setQty(id, (item.qty || 1) - 1);
          renderCart();
          return;
        }

        const incBtn = e.target.closest("[data-qty-inc]");
        if (incBtn) {
          const id = incBtn.dataset.qtyInc;
          const item = window.CART.getItems().find((i) => i.id === id);
          if (item) window.CART.setQty(id, (item.qty || 1) + 1);
          renderCart();
          return;
        }

        const removeBtn = e.target.closest("[data-cart-remove]");
        if (removeBtn) {
          window.CART.remove(removeBtn.dataset.cartRemove);
          renderCart();
          return;
        }
      });

      // Re-render when Firestore syncs the cart on login
      window.addEventListener("cart:updated", renderCart);

      renderCart();

      // ====================================================
      // ONLINE CHECKOUT (Portmone)
      // ====================================================
      const checkoutModal = document.getElementById("checkout-modal");
      const checkoutForm = document.getElementById("checkout-form");
      const checkoutTotalEl = document.getElementById("checkout-form-total");
      const pickupToggle = checkoutForm.elements.cpickup;
      const addressField = checkoutForm.querySelector("[data-address-field]");
      const addressInput = checkoutForm.elements.caddress;

      const PICKUP_ADDRESS = "Самовивіз з магазину";

      const applyPickupState = () => {
        const isPickup = pickupToggle.checked;
        addressField.hidden = isPickup;
        addressInput.required = !isPickup;
      };

      pickupToggle.addEventListener("change", applyPickupState);

      const openCheckout = () => {
        if (!window.CART.getItems().length) {
          window.showToast("Кошик порожній", { variant: "error" });
          return;
        }
        if (checkoutTotalEl) checkoutTotalEl.textContent = formatPrice(window.CART.getTotal());
        applyPickupState();
        checkoutModal.hidden = false;
        requestAnimationFrame(() => checkoutModal.classList.add("is-open"));
        document.body.style.overflow = "hidden";
      };

      const closeCheckout = () => {
        checkoutModal.classList.remove("is-open");
        document.body.style.overflow = "";
        setTimeout(() => { checkoutModal.hidden = true; }, 260);
      };

      document.addEventListener("click", (e) => {
        if (e.target.closest("[data-checkout-online]")) {
          openCheckout();
          return;
        }
        if (e.target.closest("[data-checkout-close]")) {
          closeCheckout();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !checkoutModal.hidden) closeCheckout();
      });

      checkoutForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const f = e.target.elements;
        const items = window.CART.getItems().map((i) => ({
          name: i.name,
          qty: i.qty || 1,
          price: i.price,
        }));
        if (!items.length) {
          window.showToast("Кошик порожній", { variant: "error" });
          return;
        }

        const isPickup = f.cpickup.checked;
        const address = isPickup ? PICKUP_ADDRESS : f.caddress.value.trim();

        const payload = {
          customer: {
            name: f.cname.value.trim(),
            phone: f.cphone.value.trim(),
            address,
            deliveryDate: f.cdate.value.trim(),
            comment: f.ccomment.value.trim(),
          },
          items,
        };

        if (!payload.customer.name || !payload.customer.phone || !payload.customer.address) {
          window.showToast(
            isPickup ? "Заповніть імʼя та телефон" : "Заповніть імʼя, телефон та адресу",
            { variant: "error" },
          );
          return;
        }

        const submitBtn = checkoutForm.querySelector(".checkout-form__submit");
        submitBtn.disabled = true;
        submitBtn.textContent = "Зачекайте...";

        try {
          const resp = await fetch("/api/create-payment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "Не вдалося створити оплату");

          // Будуємо приховану форму і відправляємо на шлюз Portmone
          const gw = document.createElement("form");
          gw.method = "POST";
          gw.action = data.gatewayUrl;
          Object.entries(data.fields).forEach(([key, value]) => {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = key;
            input.value = value;
            gw.appendChild(input);
          });
          document.body.appendChild(gw);
          gw.submit();
        } catch (err) {
          window.showToast(err.message || "Помилка оплати", { variant: "error" });
          submitBtn.disabled = false;
          submitBtn.textContent = "Перейти до оплати";
        }
      });

      // Повідомлення при поверненні з невдалої/скасованої оплати
      const paymentStatus = new URLSearchParams(window.location.search).get("payment");
      if (paymentStatus === "fail") {
        window.showToast("Оплата не пройшла. Спробуйте ще раз або оформіть через Telegram.", { variant: "error", duration: 5000 });
      } else if (paymentStatus === "cancel") {
        window.showToast("Оплату скасовано. Ваш кошик збережено.", { duration: 4000 });
      }
    </script>
  </body>
</html>
